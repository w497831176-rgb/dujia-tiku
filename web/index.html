<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>独家题库 - V1.0</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:#f0f4f8;color:#1e293b;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
    button,input{font:inherit}.shell{max-width:480px;min-height:100vh;margin:auto;background:#f8fafc;box-shadow:0 0 20px rgba(0,0,0,.08);position:relative;padding-bottom:76px}
    .header{padding:20px 18px 14px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}.header h1{font-size:20px;margin:0}.header p{font-size:13px;opacity:.85;margin:5px 0 0}
    .card{margin:14px 16px;padding:16px;background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
    .login{padding:54px 16px}.brand{text-align:center;margin-bottom:28px}.brand .icon{font-size:54px}.brand h1{margin:8px 0 4px;color:#2563eb}.muted{color:#94a3b8;font-size:13px}
    .input{width:100%;padding:13px 14px;margin-bottom:12px;border:1.5px solid #e2e8f0;border-radius:11px;outline:none}.input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    .primary{width:100%;padding:13px;border:0;border-radius:11px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-weight:700}.link{color:#2563eb;cursor:pointer}.center{text-align:center}
    .progress{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:12px}.progress>i{display:block;height:100%;background:#3b82f6;transition:width .3s}
    .type{display:inline-block;padding:3px 8px;border-radius:6px;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:700}.qno{font-size:13px;color:#94a3b8;margin-left:8px}
    .stem{font-size:16px;line-height:1.7;font-weight:600;margin:14px 0}.option{width:100%;padding:12px 14px;margin:0 0 10px;text-align:left;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px}.option.correct{background:#f0fdf4;border-color:#22c55e}.option.wrong{background:#fef2f2;border-color:#ef4444}.option:disabled{color:#334155}
    .analysis{margin-top:14px;padding:14px;border-left:3px solid #3b82f6;border-radius:8px;background:#eff6ff;font-size:14px;line-height:1.7}.answer{color:#15803d;font-weight:700;margin-bottom:6px}
    .actions{display:flex;gap:12px;margin:14px 16px}.actions button{flex:1;padding:11px;border-radius:10px;border:1px solid #e2e8f0;background:#fff}.actions .next{background:#2563eb;color:#fff;border-color:#2563eb}.actions button:disabled{opacity:.4}
    .tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:62px;background:#fff;border-top:1px solid #e5e7eb;display:flex}.tab{flex:1;border:0;background:none;color:#94a3b8}.tab.active{color:#2563eb;font-weight:700}
    .page{display:none}.page.active{display:block}.wrong-row{padding:13px 0;border-bottom:1px solid #f1f5f9}.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center}.stat b{display:block;font-size:22px;color:#2563eb}.empty{text-align:center;color:#94a3b8;padding:36px 10px}.toast{position:fixed;left:50%;top:48%;transform:translate(-50%,-50%);background:rgba(15,23,42,.9);color:#fff;padding:10px 16px;border-radius:8px;z-index:20}
  </style>
</head>
<body>
<div class="shell">
  <section id="loginPage" class="login">
    <div class="brand"><div class="icon">📚</div><h1>独家题库</h1><div class="muted">基础刷题系统 V1.0</div></div>
    <div class="card" id="loginForm">
      <input id="loginUsername" class="input" placeholder="请输入用户名">
      <input id="loginPassword" class="input" type="password" placeholder="请输入密码">
      <button class="primary" onclick="login()">登录</button>
      <p class="center muted">没有账号？<span class="link" onclick="showRegister()">立即注册</span></p>
    </div>
    <div class="card" id="registerForm" style="display:none">
      <input id="regUsername" class="input" placeholder="请输入用户名">
      <input id="regPassword" class="input" type="password" placeholder="请输入密码">
      <input id="regPassword2" class="input" type="password" placeholder="请再次输入密码">
      <button class="primary" onclick="register()">注册</button>
      <p class="center muted">已有账号？<span class="link" onclick="showLogin()">去登录</span></p>
    </div>
  </section>

  <main id="app" style="display:none">
    <section id="questions" class="page active">
      <header class="header"><h1>题库刷题</h1><p id="progressText">0 / 0</p><div class="progress"><i id="progressFill" style="width:0"></i></div></header>
      <div id="questionCard" class="card"><div class="empty">题库加载中...</div></div>
      <div class="actions"><button id="prevBtn" onclick="move(-1)">上一题</button><button id="nextBtn" class="next" onclick="move(1)">下一题</button></div>
    </section>

    <section id="wrong" class="page">
      <header class="header"><h1>错题集</h1><p>集中复习答错的题目</p></header>
      <div id="wrongList" class="card"></div>
    </section>

    <section id="profile" class="page">
      <header class="header"><h1 id="profileName">我的</h1><p>学习进度</p></header>
      <div class="card stat-grid"><div class="stat"><b id="statTotal">0</b><span class="muted">已做</span></div><div class="stat"><b id="statCorrect">0</b><span class="muted">答对</span></div><div class="stat"><b id="statRate">0%</b><span class="muted">正确率</span></div></div>
      <div class="card"><button class="primary" onclick="logout()">退出登录</button></div>
    </section>

    <nav class="tabs"><button class="tab active" data-page="questions" onclick="switchPage('questions')">📖<br>题库</button><button class="tab" data-page="wrong" onclick="switchPage('wrong')">❌<br>错题</button><button class="tab" data-page="profile" onclick="switchPage('profile')">👤<br>我的</button></nav>
  </main>
</div>
<div id="toastRoot"></div>
<script>
  const API='/api';
  let token=localStorage.getItem('du_tiku_token')||'';
  let user=null,questions=[],answers={},wrong=[],index=0;
  async function request(path,options={}){options.headers=options.headers||{};if(token)options.headers.Authorization='Bearer '+token;if(options.body&&typeof options.body==='object'){options.headers['Content-Type']='application/json';options.body=JSON.stringify(options.body)}const r=await fetch(API+path,options);const data=await r.json().catch(()=>({}));if(!r.ok)throw new Error(data.error||'请求失败');return data}
  function toast(text){const el=document.createElement('div');el.className='toast';el.textContent=text;document.getElementById('toastRoot').appendChild(el);setTimeout(()=>el.remove(),1600)}
  function showRegister(){loginForm.style.display='none';registerForm.style.display='block'}
  function showLogin(){registerForm.style.display='none';loginForm.style.display='block'}
  async function login(){try{const r=await request('/auth/login',{method:'POST',body:{username:loginUsername.value.trim(),password:loginPassword.value}});setSession(r);await load();showApp()}catch(e){toast(e.message)}}
  async function register(){if(regPassword.value!==regPassword2.value)return toast('两次密码不一致');try{const r=await request('/auth/register',{method:'POST',body:{username:regUsername.value.trim(),password:regPassword.value,confirmPassword:regPassword2.value}});setSession(r);await load();showApp()}catch(e){toast(e.message)}}
  function setSession(r){token=r.token;user=r.user;localStorage.setItem('du_tiku_token',token)}
  async function load(){const [me,q,a,w]=await Promise.all([request('/auth/me'),request('/questions/'),request('/answers/'),request('/wrong/')]);user=me;questions=q.questions||[];answers=a.answers||{};wrong=w.wrongQuestions||[];render();renderWrong();renderProfile()}
  function showApp(){loginPage.style.display='none';app.style.display='block'}
  function logout(){token='';user=null;localStorage.removeItem('du_tiku_token');app.style.display='none';loginPage.style.display='block'}
  function render(){if(!questions.length){questionCard.innerHTML='<div class="empty">暂无题目</div>';return}index=Math.max(0,Math.min(index,questions.length-1));const q=questions[index],record=answers[q.id],selected=record&&record.selected;let html='<div><span class="type">'+q.type+'</span><span class="qno">第 '+(index+1)+' 题</span><div class="stem">'+q.stem+'</div>';Object.keys(q.options||{}).forEach(k=>{let cls='option';if(record&&k===q.answer)cls+=' correct';else if(record&&k===selected)cls+=' wrong';html+='<button class="'+cls+'" '+(record?'disabled':'onclick="answer('+q.id+',\''+k+'\')"')+'><b>'+k+'.</b> '+q.options[k]+'</button>'});if(record)html+='<div class="analysis"><div class="answer">正确答案：'+q.answer+'</div>'+(q.analysis||'')+'</div>';questionCard.innerHTML=html+'</div>';const done=Object.keys(answers).length;progressText.textContent=done+' / '+questions.length;progressFill.style.width=(questions.length?done/questions.length*100:0)+'%';prevBtn.disabled=index===0;nextBtn.disabled=index===questions.length-1}
  async function answer(id,selected){try{await request('/answers/',{method:'POST',body:{questionId:id,selected}});const q=questions.find(x=>x.id===id);answers[id]={selected,isCorrect:selected===q.answer};await load();render()}catch(e){toast(e.message)}}
  function move(delta){index+=delta;render();scrollTo({top:0,behavior:'smooth'})}
  function renderWrong(){if(!wrong.length){wrongList.innerHTML='<div class="empty">暂无错题</div>';return}wrongList.innerHTML=wrong.map(x=>'<div class="wrong-row"><b>第 '+x.id+' 题 · '+x.type+'</b><div class="muted">'+x.stem+'</div></div>').join('')}
  function renderProfile(){if(!user)return;profileName.textContent=user.username;const list=Object.values(answers),correct=list.filter(x=>x.isCorrect).length;statTotal.textContent=list.length;statCorrect.textContent=correct;statRate.textContent=(list.length?Math.round(correct/list.length*100):0)+'%'}
  function switchPage(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelector('[data-page="'+id+'"]').classList.add('active');if(id==='wrong')renderWrong();if(id==='profile')renderProfile()}
  (async()=>{if(!token)return;try{await load();showApp()}catch(e){logout()}})();
</script>
</body>
</html>
